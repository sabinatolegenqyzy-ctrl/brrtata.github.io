<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Мамыр — Шақыру</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif, Arial;
            background: linear-gradient(135deg, #e0f2fe 0%, #7dd3fc 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #0c4a6e;
        }

        /* Блок для музыки сверху */
        .music-player {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        .main-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 900px;
            width: 90%;
        }

        h1 {
            font-size: 42px; /* Очень крупный текст */
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .info {
            font-size: 24px;
            margin-bottom: 40px;
            color: #0284c7;
            background: #f0f9ff;
            padding: 20px;
            border-radius: 20px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .btn {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        #yesBtn {
            background-color: #38bdf8;
            color: white;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4);
        }

        #noBtn {
            background-color: #f1f5f9;
            color: #64748b;
            position: relative; /* Для работы скрипта перемещения */
        }

        .result-section {
            display: none;
            animation: fadeIn 0.8s ease;
        }

        .result-section img {
            max-width: 100%;
            height: auto;
            border-radius: 30px;
            margin-top: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-container" id="inviteCard">
        
        <div id="startContent">
            <h1>Біздің 7 мамыр мерекесіне орай өтетін кешімізге келесің бе? ✨</h1>
            
            <div class="info">
                📍 <b>Өтетін орны:</b> Мектеп фойесі <br>
                📅 <b>Күні:</b> 5 мамыр <br>
                ⏰ <b>Уақыты:</b> 10:30
            </div>

            <div class="btn-container">
                <button class="btn" id="yesBtn" onclick="showResponse('yes')">Келемін</button>
                <button class="btn" id="noBtn" onmouseover="moveButton()" onclick="showResponse('no')">Келмеймін</button>
            </div>
        </div>

        <div id="yesResponse" class="result-section">
            <h2 style="font-size: 36px;">Керемет! Күтеміз! 🩵</h2>
            <img src="dimosh.jpg" alt="Приду">
        </div>

        <div id="noResponse" class="result-section">
            <h2 style="font-size: 36px;">Өкінішті... 😔</h2>
            <img src="foto_no.jpg" alt="Не приду">
        </div>

    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function showResponse(type) {
            document.getElementById('startContent').style.display = 'none';
            if (type === 'yes') {
                document.getElementById('yesResponse').style.display = 'block';
            } else {
                document.getElementById('noResponse').style.display = 'block';
            }
        }
    </script>

</body>
</html>
